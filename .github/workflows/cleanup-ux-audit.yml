name: Cleanup Temporary UX Audit Tooling

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/cleanup-ux-audit.yml

permissions:
  contents: write

concurrency:
  group: cleanup-ux-audit
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Remove temporary reports and one-off tooling
        run: |
          rm -rf automation/ux-audit
          rm -f scripts/visual-ux-audit.mjs
          rm -f scripts/remediate-rendered-ux.mjs
          rm -f scripts/finalize-rendered-ux.mjs
          rm -f scripts/diagnose-home-aria.mjs
          rm -f scripts/remove-redundant-ticker.mjs
          rm -f scripts/remove-homepage-embed.mjs
          rm -f .github/workflows/visual-ux-audit.yml
          rm -f .github/workflows/remediate-rendered-ux.yml
          rm -f .github/workflows/finalize-rendered-ux.yml
          rm -f .github/workflows/diagnose-home-aria.yml
          rm -f .github/workflows/remove-redundant-ticker.yml
          rm -f .github/workflows/remove-homepage-embed.yml
          rm -f .github/workflows/cleanup-ux-audit.yml
      - name: Commit cleanup
        run: |
          git config user.name 'CUAI UX Cleanup'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'Chore: remove temporary UX audit tooling'
          git pull --rebase origin main
          git push origin HEAD:main
