name: Rendered Visual UX Audit

on:
  push:
    branches: [main]
    paths:
      - scripts/visual-ux-audit.mjs
      - .github/workflows/visual-ux-audit.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rendered-visual-ux-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install browser audit tools
        run: |
          npm install --no-save playwright @axe-core/playwright
          npx playwright install --with-deps chromium
      - name: Audit production rendering
        run: node scripts/visual-ux-audit.mjs
      - name: Commit final no-ticker verification
        run: |
          git config user.name 'CUAI UX Audit'
          git config user.email 'actions@users.noreply.github.com'
          git add automation/ux-audit
          if git diff --cached --quiet; then
            echo 'No audit output changed.'
            exit 0
          fi
          git commit -m 'Audit: confirm accessible rendered UX baseline'
          git push origin HEAD:main
