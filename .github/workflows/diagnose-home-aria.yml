name: Diagnose Home ARIA
on:
  push:
    branches: [main]
    paths:
      - scripts/diagnose-home-aria.mjs
      - .github/workflows/diagnose-home-aria.yml
permissions:
  contents: write
concurrency:
  group: final-ux-write
  cancel-in-progress: false
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: |
          npm install --no-save playwright @axe-core/playwright
          npx playwright install --with-deps chromium
      - run: node scripts/diagnose-home-aria.mjs
      - run: |
          git config user.name 'CUAI UX Audit'
          git config user.email 'actions@users.noreply.github.com'
          git add automation/ux-audit/home-aria-diagnostic.json
          git commit -m 'Audit: isolate homepage ARIA issue'
          git pull --rebase origin main
          git push origin HEAD:main
