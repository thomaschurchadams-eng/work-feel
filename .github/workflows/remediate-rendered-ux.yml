name: Remediate Rendered UX

on:
  push:
    branches: [main]
    paths:
      - scripts/remediate-rendered-ux.mjs
      - .github/workflows/remediate-rendered-ux.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: remediate-rendered-ux
  cancel-in-progress: false

jobs:
  remediate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply UX and conversion changes
        run: node scripts/remediate-rendered-ux.mjs
      - name: Validate generated files
        run: |
          git diff --check
          node --check assets/app.js
          grep -q 'class="nav-toggle"' index.html
          grep -q 'Get the weekly briefing' index.html
          grep -q 'Join the weekly briefing' newsletter.html
          grep -q 'id="alert-search"' alerts/index.html
          ! grep -q 'Automated email signup is coming' newsletter.html
      - name: Commit remediation
        run: |
          if git diff --quiet; then
            echo 'No UX remediation changes required.'
            exit 0
          fi
          git config user.name 'CUAI UX Remediation'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'UX: simplify navigation and strengthen conversion paths'
          git push origin HEAD:main
