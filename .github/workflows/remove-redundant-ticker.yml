name: Remove Redundant Alert Ticker
on:
  push:
    branches: [main]
    paths:
      - scripts/remove-redundant-ticker.mjs
      - .github/workflows/remove-redundant-ticker.yml
permissions:
  contents: write
concurrency:
  group: final-ux-write
  cancel-in-progress: false
jobs:
  remove:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/remove-redundant-ticker.mjs
      - run: |
          node --check assets/app.js
          ! grep -q 'buildTicker' assets/app.js
          git diff --check
      - run: |
          git config user.name 'CUAI UX Remediation'
          git config user.email 'actions@users.noreply.github.com'
          git add assets/app.js
          git commit -m 'UX: remove redundant alert ticker'
          git pull --rebase origin main
          git push origin HEAD:main
